name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: 3.11
          enable-cache: true

      - name: Install
        run: uv sync

      - name: Smoke test
        run: uv run python -m brainmarks.main_probe -h

      - name: Build
        run: uv build

      - name: Publish
        run: uv publish
